<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Sky - overcast grey -->
  <rect fill="#4a4a4a" width="800" height="300"/>
  <rect fill="#3a3a3a" y="250" width="800" height="50" opacity="0.5"/>

  <!-- Ground - devastation -->
  <rect fill="#2a2520" y="300" width="800" height="300"/>

  <!-- Debris shapes -->
  <rect fill="#3d3530" x="50" y="320" width="120" height="60" rx="2" transform="rotate(-5 110 350)"/>
  <rect fill="#4a4035" x="200" y="340" width="80" height="45" rx="2" transform="rotate(8 240 362)"/>
  <rect fill="#3d3530" x="400" y="310" width="150" height="70" rx="2" transform="rotate(-3 475 345)"/>
  <rect fill="#4a4035" x="600" y="330" width="100" height="50" rx="2" transform="rotate(6 650 355)"/>
  <rect fill="#353025" x="100" y="380" width="60" height="40" rx="2" transform="rotate(-10 130 400)"/>
  <rect fill="#4a4035" x="300" y="370" width="90" height="55" rx="2" transform="rotate(4 345 397)"/>
  <rect fill="#353025" x="520" y="360" width="110" height="65" rx="2" transform="rotate(-7 575 392)"/>

  <!-- Scattered lines (broken structures) -->
  <line x1="150" y1="330" x2="220" y2="350" stroke="#5a5045" stroke-width="3"/>
  <line x1="350" y1="320" x2="380" y2="370" stroke="#5a5045" stroke-width="2"/>
  <line x1="550" y1="340" x2="610" y2="360" stroke="#5a5045" stroke-width="3"/>

  <!-- Water/ocean in distance -->
  <rect fill="#3a4550" y="280" width="800" height="30" opacity="0.4"/>

  <!-- Date text -->
  <text x="400" y="500" fill="#8a7a6a" font-size="28" text-anchor="middle" font-family="serif" font-weight="300">2011.03</text>
  <text x="400" y="535" fill="#6a5a4a" font-size="14" text-anchor="middle" font-family="serif" letter-spacing="3">BEFORE</text>
</svg>